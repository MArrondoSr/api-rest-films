<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Rest Films</title>
    <link rel="stylesheet" href="./reset.css" />
    <link rel="stylesheet" href="./estilos.css" />
</head>

<body>
    <header class="marquesina">
        <div class="marquesina__luces"></div>
        <h1>API REST FILMS</h1>
        <p>Catálogo privado de películas</p>
    </header>

    <main class="cine">
        <section class="cartelera">
            <h2>Ahora en cartelera</h2>

            <div class="galeria" id="galeria">
                <a class="galeria__item" href="./imagenes/streets_of_fire.jpg">
                    <img src="./imagenes/streets_of_fire.jpg" alt="Streets of Fire">
                    <h3>Streets of Fire</h3>
                    <p>1984</p>
                </a>

                <a class="galeria__item" href="./imagenes/girl_motorcycle.jpg">
                    <img src="./imagenes/girl_motorcycle.jpg" alt="The Girl on a Motorcycle">
                    <h3>The Girl on a Motorcycle</h3>
                    <p>1968</p>
                </a>

                <a class="galeria__item" href="./imagenes/citizen_kane.jpg">
                    <img src="./imagenes/citizen_kane.jpg" alt="Citizen Kane">
                    <h3>Citizen Kane</h3>
                    <p>1941</p>
                </a>

                <a class="galeria__item" href="./imagenes/gabriela.jpg">
                    <img src="./imagenes/gabriela.jpg" alt="Gabriela">
                    <h3>Gabriela</h3>
                    <p>1983</p>
                </a>

                <a class="galeria__item" href="./imagenes/spy_who_loved_me.jpg">
                    <img src="./imagenes/spy_who_loved_me.jpg" alt="The Spy Who Loved Me">
                    <h3>The Spy Who Loved Me</h3>
                    <p>1977</p>
                </a>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 API REST FILMS</p>
    </footer>
</body>
</html>
